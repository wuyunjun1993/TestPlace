plugins {
    id 'java'
    id 'application'
}

group = 'com.wordgame'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

java {
    sourceCompatibility = '11'
    targetCompatibility = '11'
}

application {
    mainClass = 'com.wordgame.WordGuessingGame'
}

test {
    useJUnit()
}
